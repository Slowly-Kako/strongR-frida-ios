name: Build strongR-frida iOS

on:
  workflow_dispatch:
    inputs:
      frida_version:
        description: 'Frida version to build (e.g. 17.7.3)'
        required: true
        default: '17.7.3'

jobs:
  build:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Setup environment
        run: |
          python3 --version
          pip3 install meson ninja
          brew install vala
          pip3 install lief
          xcode-select -p
          xcrun --sdk iphoneos --show-sdk-path
          xcodebuild -version

      - name: Clone Frida source
        run: |
          FRIDA_VERSION=${{ github.event.inputs.frida_version }}
          echo "Building Frida $FRIDA_VERSION for iOS arm64"
          git clone --recurse-submodules -b $FRIDA_VERSION https://github.com/frida/frida.git
          cd frida
          echo "Frida source cloned at $(git describe --tags)"

      - name: Download and apply Patchs
        run: |
          git clone https://github.com/hluwa/Patchs.git
          cd frida/subprojects/frida-core
          echo "Applying strongR-frida patches..."
          for patch in ../../../Patchs/strongR-frida/frida-core/*.patch; do
            echo "Applying: $(basename $patch)"
            git apply "$patch" || {
              echo "Warning: git apply failed, trying patch -p1..."
              patch -p1 < "$patch" || echo "Patch $(basename $patch) failed, skipping"
            }
          done
          echo "All patches applied."
          git diff --stat

      - name: Remove unnecessary subprojects
        run: |
          cd frida
          # Remove Python-dependent subprojects that we don't need
          rm -rf subprojects/frida-python
          rm -rf subprojects/frida-tools
          rm -rf subprojects/frida-node
          rm -rf subprojects/frida-qml
          rm -rf subprojects/frida-clr
          rm -rf subprojects/frida-swift
          # Remove references from meson.build
          sed -i '' "/frida-python/d" meson.build
          sed -i '' "/frida-tools/d" meson.build
          sed -i '' "/frida-node/d" meson.build
          sed -i '' "/frida-qml/d" meson.build
          sed -i '' "/frida-clr/d" meson.build
          sed -i '' "/frida-swift/d" meson.build
          echo "Cleaned up subprojects"
          cat meson.build

      - name: Build frida-server for iOS arm64
        run: |
          cd frida
          make core-ios-arm64
          echo "=== Build completed! ==="
          echo "Searching for built files..."
          find build -name 'frida-server' -type f 2>/dev/null
          find build -name 'frida-agent*' -type f 2>/dev/null
          find build -type f \( -name 'frida-server' -o -name 'frida-agent*' \) 2>/dev/null

      - name: Collect build artifacts
        run: |
          mkdir -p output
          FRIDA_VERSION=${{ github.event.inputs.frida_version }}
          
          # Search broadly for built binaries
          echo "=== All frida binaries found ==="
          find frida/build -type f -name 'frida*' 2>/dev/null | head -50
          
          # Copy server
          find frida/build -name 'frida-server' -type f 2>/dev/null | head -1 | while read f; do
            echo "Found server: $f"
            cp "$f" "output/frida-server-strongR-${FRIDA_VERSION}-ios-arm64"
          done
          
          # Copy agent
          find frida/build -name 'frida-agent.dylib' -type f 2>/dev/null | head -1 | while read f; do
            echo "Found agent: $f"
            cp "$f" "output/frida-agent-strongR-${FRIDA_VERSION}-ios-arm64.dylib"
          done
          
          # Also try .a static libraries
          find frida/build -name 'frida-core*' -type f 2>/dev/null | head -5 | while read f; do
            echo "Found core lib: $f"
          done
          
          echo "=== Output directory ==="
          ls -la output/ 2>/dev/null || echo "output is empty"
          
          if [ -z "$(ls -A output 2>/dev/null)" ]; then
            echo "WARNING: No server/agent binaries found in standard paths"
            echo "=== Full build directory listing ==="
            find frida/build -type f 2>/dev/null | grep -v '__pycache__' | head -100
            exit 1
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: strongR-frida-ios-arm64-${{ github.event.inputs.frida_version }}
          path: output/
          retention-days: 30
